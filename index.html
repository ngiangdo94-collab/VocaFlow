<script>
let words = JSON.parse(localStorage.getItem("words")) || [
  {en:"Apple", vi:"quả táo"},
  {en:"Cat", vi:"con mèo"},
  {en:"Book", vi:"quyển sách"}
];

const list = document.getElementById("list");

let currentIndex = null;

function render() {
  list.innerHTML = words.map((w, i) =>
    `<div class="card">
      <div onclick="showFlashcard(${i})">
        ${w.en}
      </div>
      <button class="delete" onclick="deleteWord(${i})">X</button>
    </div>`
  ).join("");

  localStorage.setItem("words", JSON.stringify(words));
}

function addWord() {
  const en = document.getElementById("en").value.trim();
  const vi = document.getElementById("vi").value.trim();

  if(!en || !vi) return;

  words.push({en, vi});

  document.getElementById("en").value = "";
  document.getElementById("vi").value = "";

  render();
}

function deleteWord(i) {
  words.splice(i, 1);
  render();
}

function showFlashcard(i) {
  currentIndex = i;
  const w = words[i];

  list.innerHTML = `
    <div class="card" style="text-align:center; font-size:20px;">
      <p><b>${w.en}</b></p>
      <p id="answer" style="display:none;">${w.vi}</p>

      <button onclick="toggleAnswer()">Hiện nghĩa</button>
      <button onclick="render()">Thoát</button>
    </div>
  `;
}

function toggleAnswer() {
  document.getElementById("answer").style.display = "block";
}

render();
</script>
