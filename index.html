<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VocaFlow</title>
</head>

<body>
  <h1>VocaFlow</h1>
  <p>Từ vựng của bạn</p>

  <div id="list"></div>

  <script>
    const words = [
      "Apple - quả táo",
      "Book - quyển sách",
      "Cat - con mèo"
    ];

    document.getElementById("list").innerHTML =
      words.map(w => `<p>${w}</p>`).join("");
  </script>
</body>
</html>
