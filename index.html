<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VocaFlow</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      color: #2c3e50;
    }

    .input-box {
      margin-bottom: 15px;
    }

    input {
      padding: 8px;
      margin-right: 5px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <h1>VocaFlow</h1>
  <p>Ứng dụng từ vựng của bạn</p>

  <div class="input-box">
    <input id="en" placeholder="English">
    <input id="vi" placeholder="Vietnamese">
    <button onclick="addWord()">Thêm từ</button>
  </div>

  <div id="list"></div>

<script>
let words = JSON.parse(localStorage.getItem("words")) || [
  {en:"Apple", vi:"quả táo"},
  {en:"Cat", vi:"con mèo"},
  {en:"Book", vi:"quyển sách"}
];

const list = document.getElementById("list");

function render() {
  list.innerHTML = words.map((w, i) =>
    `<div class="card">
      <div onclick="alert('${w.en} - ${w.vi}')">
        ${w.en} - ${w.vi}
      </div>
      <button class="delete" onclick="deleteWord(${i})">X</button>
    </div>`
  ).join("");

  localStorage.setItem("words", JSON.stringify(words));
}

function addWord() {
  const en = document.getElementById("en").value.trim();
  const vi = document.getElementById("vi").value.trim();

  if(!en || !vi) return;

  words.push({en, vi});

  document.getElementById("en").value = "";
  document.getElementById("vi").value = "";

  render();
}

function deleteWord(i) {
  words.splice(i, 1);
  render();
}

render();
</script>

</body>
</html>
