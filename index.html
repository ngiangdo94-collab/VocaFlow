<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VocaFlow</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
    }
    .card {
      background: white;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>
  <h1>VocaFlow</h1>
  <p>Từ vựng của bạn</p>

  <input id="en" placeholder="English">
  <input id="vi" placeholder="Vietnamese">
  <button onclick="addWord()">Thêm từ</button>

  <div id="list"></div>

<script>
let words = JSON.parse(localStorage.getItem("words")) || [
  {en:"Apple", vi:"quả táo"},
  {en:"Cat", vi:"con mèo"}
];

const list = document.getElementById("list");

function render() {
  list.innerHTML = words.map((w, i) =>
    `<div class="card">
      ${w.en} - ${w.vi}
      <button onclick="deleteWord(${i})">X</button>
    </div>`
  ).join("");

  localStorage.setItem("words", JSON.stringify(words));
}

function addWord() {
  const en = document.getElementById("en").value;
  const vi = document.getElementById("vi").value;

  if(!en || !vi) return;

  words.push({en, vi});
  render();
}

function deleteWord(i) {
  words.splice(i, 1);
  render();
}

render();
</script>
</body>
