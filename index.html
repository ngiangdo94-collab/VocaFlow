<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VocaFlow</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
    }
    .card {
      background: white;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>
  <h1>VocaFlow</h1>
  <p>Từ vựng của bạn</p>

  <div id="list"></div>

  <script>
    const words = [
      "Apple - quả táo",
      "Cat - con mèo",
      "Book - quyển sách",
      "Dog - con chó",
      "Water - nước"
    ];

    const list = document.getElementById("list");

    list.innerHTML = words
      .map(w => `<div class="card">${w}</div>`)
      .join("");
  </script>
</body>
</html>
